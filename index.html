<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Logo Animation</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: white;
        }

        canvas {
            background-color: white;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const logicalSize = 450;

        function setupCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = logicalSize * dpr;
            canvas.height = logicalSize * dpr;
            canvas.style.width = `${logicalSize}px`;
            canvas.style.height = `${logicalSize}px`;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        setupCanvas();

        const targetPositions = [
            { x: 225, y: 100, color: "#2C7E3D" },
            { x: 180, y: 145, color: "#3D9248" },
            { x: 270, y: 145, color: "#70A770" },
            { x: 135, y: 190, color: "#2C7E3D" },
            { x: 225, y: 190, color: "#145A20" },
            { x: 315, y: 190, color: "#70A770" },
            { x: 180, y: 235, color: "#3D9248" },
            { x: 270, y: 235, color: "#70A770" },
            { x: 225, y: 280, color: "#A8D0A8" }
        ];

        let circles;
        let textOpacity = 0;

        function resetCircles() {
            circles = targetPositions.map(pos => ({
                x: Math.random() * logicalSize,
                y: Math.random() * logicalSize,
                targetX: pos.x,
                targetY: pos.y,
                color: pos.color
            }));
            textOpacity = 0;
        }

        function drawSpacedText(text, centerX, y, letterSpacing) {
            const totalWidth = [...text].reduce((width, char, index, chars) => {
                return width + ctx.measureText(char).width + (index < chars.length - 1 ? letterSpacing : 0);
            }, 0);

            let x = centerX - totalWidth / 2;
            [...text].forEach(char => {
                ctx.fillText(char, x, y);
                x += ctx.measureText(char).width + letterSpacing;
            });
        }

        function animate() {
            ctx.clearRect(0, 0, logicalSize, logicalSize);
            let allArrived = true;

            circles.forEach(circle => {
                if (Math.abs(circle.x - circle.targetX) > 1 || Math.abs(circle.y - circle.targetY) > 1) {
                    allArrived = false;
                    circle.x += (circle.targetX - circle.x) * 0.05;
                    circle.y += (circle.targetY - circle.y) * 0.05;
                }
                ctx.beginPath();
                ctx.arc(circle.x, circle.y, 20, 0, Math.PI * 2);
                ctx.fillStyle = circle.color;
                ctx.fill();
                ctx.closePath();
            });

            if (!allArrived) {
                textOpacity += 0.015;
                if (textOpacity > 1) textOpacity = 1;
            } else {
                textOpacity = 1;
            }

            const logoFontStack = [
                "'Noto Serif TC'",
                "'Songti TC'",
                "'PMingLiU'",
                "'Times New Roman'",
                "serif"
            ].join(", ");
            ctx.font = `600 48px ${logoFontStack}`;
            ctx.fillStyle = `rgba(0, 0, 0, ${textOpacity})`;
            ctx.textAlign = "left";
            drawSpacedText("九合", 225, 360, 11);

            if (!allArrived) {
                requestAnimationFrame(animate);
            } else {
                setTimeout(() => {
                    resetCircles();
                    animate();
                }, 1000); // Restart the animation after a brief delay.
            }
        }

        resetCircles();
        animate();
    </script>
</body>

</html>
